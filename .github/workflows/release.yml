name: Publish bit-form to NPM

on:
  push:
    tags:
      - "v*" # Dispara o fluxo sempre que uma tag começando com 'v' for enviada

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Instalar dependências
        run: npm install

      - name: Rodar Testes
        run: npm test

      - name: Build do Projeto
        run: npm run build

      - name: Publicar no NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # Gera automaticamente a lista de commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
